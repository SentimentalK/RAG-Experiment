services:
  postgres:
    image: pgvector/pgvector:0.8.5-pg16
    container_name: sherlock_rag_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sherlock_rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: sherlock_rag_backend
    restart: unless-stopped

    environment:
      DATABASE_URL: >-
        postgresql://${POSTGRES_USER:-rag_user}:${POSTGRES_PASSWORD:-rag_password}@postgres:5432/${POSTGRES_DB:-sherlock_rag}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-openai/gpt-oss-120b}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      CORS_ORIGINS: '["http://localhost:5173"]'

    ports:
      - "8000:8000"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready')"
        ]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile

    container_name: sherlock_rag_frontend
    restart: unless-stopped

    ports:
      - "5173:80"

    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  huggingface_cache:
